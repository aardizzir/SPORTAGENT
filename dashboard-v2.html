<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sport Agent - Análisis de Perfiles</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --black: #0a0a0a;
            --earth: #9d8164;
            --moss: #5a7a65;
            --cream: #FAF6F0;
            --red: #cc6666;
            --green: #2d5016;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--black);
            color: var(--cream);
            padding: 2rem;
            font-weight: 300;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .header {
            margin-bottom: 3rem;
            border-bottom: 1px solid rgba(250, 246, 240, 0.1);
            padding-bottom: 2rem;
        }
        
        h1 {
            font-size: 2.5rem;
            font-weight: 300;
            margin-bottom: 0.5rem;
            color: var(--moss);
        }
        
        .subtitle {
            font-size: 1rem;
            opacity: 0.6;
            font-weight: 300;
        }
        
        .load-section {
            background: rgba(90, 122, 101, 0.1);
            border: 1px solid var(--moss);
            padding: 2rem;
            border-radius: 8px;
            margin-bottom: 3rem;
        }
        
        .btn {
            background: var(--moss);
            color: var(--cream);
            border: none;
            padding: 0.8rem 2rem;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-right: 1rem;
        }
        
        .btn:hover {
            background: #6a8a75;
            transform: translateY(-2px);
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .btn-secondary {
            background: transparent;
            border: 1px solid var(--moss);
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }
        
        .stat-card {
            background: rgba(250, 246, 240, 0.03);
            border: 1px solid rgba(250, 246, 240, 0.1);
            padding: 1.5rem;
            border-radius: 8px;
        }
        
        .stat-value {
            font-size: 2.5rem;
            font-weight: 600;
            color: var(--moss);
            margin-bottom: 0.5rem;
        }
        
        .stat-label {
            font-size: 0.85rem;
            opacity: 0.7;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        
        .profiles-section {
            margin-bottom: 3rem;
        }
        
        .section-title {
            font-size: 1.5rem;
            font-weight: 400;
            margin-bottom: 2rem;
            color: var(--cream);
            border-bottom: 1px solid rgba(250, 246, 240, 0.1);
            padding-bottom: 1rem;
        }
        
        .profile-card {
            background: rgba(250, 246, 240, 0.03);
            border-left: 4px solid;
            padding: 2rem;
            margin-bottom: 1.5rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .profile-card:hover {
            background: rgba(250, 246, 240, 0.05);
            transform: translateX(5px);
        }
        
        .profile-card.maggie { border-left-color: #cc6666; }
        .profile-card.kako { border-left-color: #5a7a65; }
        .profile-card.agus { border-left-color: #9d8164; }
        .profile-card.pro { border-left-color: #2d5016; }
        .profile-card.anti { border-left-color: #666666; }
        
        .profile-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }
        
        .profile-name {
            font-size: 1.3rem;
            font-weight: 600;
        }
        
        .profile-count {
            background: var(--moss);
            color: var(--cream);
            padding: 0.3rem 1rem;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
        }
        
        .profile-description {
            opacity: 0.8;
            line-height: 1.6;
            margin-bottom: 1rem;
        }
        
        .profile-traits {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }
        
        .trait {
            background: rgba(90, 122, 101, 0.2);
            padding: 0.4rem 1rem;
            border-radius: 20px;
            font-size: 0.85rem;
        }
        
        .profile-details {
            display: none;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(250, 246, 240, 0.1);
        }
        
        .profile-details.active {
            display: block;
        }
        
        .detail-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
        }
        
        .detail-item {
            background: rgba(0, 0, 0, 0.3);
            padding: 1rem;
            border-radius: 4px;
        }
        
        .detail-label {
            font-size: 0.75rem;
            opacity: 0.6;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }
        
        .detail-value {
            font-size: 1rem;
            font-weight: 500;
        }
        
        .filters {
            background: rgba(250, 246, 240, 0.03);
            border: 1px solid rgba(250, 246, 240, 0.1);
            padding: 1.5rem;
            border-radius: 8px;
            margin-bottom: 2rem;
        }
        
        .filter-group {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }
        
        .filter-btn {
            background: transparent;
            border: 1px solid rgba(250, 246, 240, 0.2);
            color: var(--cream);
            padding: 0.6rem 1.2rem;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
            border-radius: 4px;
        }
        
        .filter-btn:hover {
            border-color: var(--moss);
            background: rgba(90, 122, 101, 0.1);
        }
        
        .filter-btn.active {
            background: var(--moss);
            border-color: var(--moss);
        }
        
        .insights {
            background: rgba(90, 122, 101, 0.1);
            border: 1px solid var(--moss);
            padding: 2rem;
            border-radius: 8px;
            margin-top: 3rem;
        }
        
        .insight-item {
            margin-bottom: 1rem;
            padding-left: 1.5rem;
            position: relative;
        }
        
        .insight-item::before {
            content: '→';
            position: absolute;
            left: 0;
            color: var(--moss);
        }
        
        .loading {
            text-align: center;
            padding: 3rem;
            opacity: 0.6;
        }
        
        .error {
            background: rgba(204, 102, 102, 0.1);
            border: 1px solid var(--red);
            padding: 1.5rem;
            border-radius: 8px;
            margin-bottom: 2rem;
        }
        
        .success {
            background: rgba(90, 122, 101, 0.1);
            border: 1px solid var(--moss);
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .loading {
            animation: pulse 1.5s infinite;
        }
        
        pre {
            background: rgba(0,0,0,0.3);
            padding: 1rem;
            border-radius: 4px;
            overflow-x: auto;
            font-size: 0.85rem;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Sport Agent - Análisis de Perfiles</h1>
            <p class="subtitle">Dashboard de arquetipos de usuarios</p>
        </div>
        
        <div class="load-section">
            <p style="margin-bottom: 1rem;">Conectando a Google Sheets...</p>
            <button class="btn" onclick="loadDataMethod1()" id="loadBtn1">Método 1: Cargar Datos</button>
            <button class="btn btn-secondary" onclick="loadDataMethod2()" id="loadBtn2">Método 2 (Alternativo)</button>
            <p style="margin-top: 1rem; font-size: 0.85rem; opacity: 0.6;">
                Sheet ID: 1MVQj-Mr4wEWldcN6tehLgGqZUw41v_qLMLKxlclVlCk<br>
                Hoja: "Hoja 1"
            </p>
            <div id="debugInfo" style="margin-top: 1rem;"></div>
        </div>
        
        <div id="content" style="display: none;">
            <div class="stats-grid" id="statsGrid"></div>
            
            <div class="filters">
                <div class="filter-group">
                    <button class="filter-btn active" onclick="filterProfiles('all')">Todos</button>
                    <button class="filter-btn" onclick="filterProfiles('target')">Solo Target</button>
                    <button class="filter-btn" onclick="filterProfiles('high-value')">Alto Valor ($10+)</button>
                    <button class="filter-btn" onclick="filterProfiles('needs-help')">Necesita Ayuda</button>
                </div>
            </div>
            
            <div class="profiles-section">
                <h2 class="section-title">Arquetipos Identificados</h2>
                <div id="profilesContainer"></div>
            </div>
            
            <div class="insights">
                <h2 class="section-title">Insights Clave</h2>
                <div id="insightsContainer"></div>
            </div>
        </div>
        
        <div id="loading" class="loading" style="display: none;">
            Cargando datos...
        </div>
        
        <div id="error" class="error" style="display: none;"></div>
    </div>
    
    <script>
        const SHEET_ID = '1MVQj-Mr4wEWldcN6tehLgGqZUw41v_qLMLKxlclVlCk';
        const SHEET_NAME = 'Hoja 1';
        
        let allData = [];
        let profiles = {
            maggie: [],
            kako: [],
            agus: [],
            pro: [],
            anti: []
        };
        
        // MÉTODO 1: Google Visualization API
        async function loadDataMethod1() {
            showLoading(true);
            hideError();
            disableButtons(true);
            
            try {
                const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_NAME)}`;
                
                showDebug(`Intentando cargar desde: ${url}`);
                
                const response = await fetch(url);
                const text = await response.text();
                
                showDebug(`Respuesta recibida (primeros 200 chars): ${text.substring(0, 200)}`);
                
                // Parse Google Sheets JSON response
                const json = JSON.parse(text.substring(47).slice(0, -2));
                const rows = json.table.rows;
                
                showDebug(`Filas encontradas: ${rows.length}`);
                
                processData(rows);
                
            } catch (error) {
                showError(`Método 1 falló: ${error.message}`, error);
            }
        }
        
        // MÉTODO 2: CSV Export
        async function loadDataMethod2() {
            showLoading(true);
            hideError();
            disableButtons(true);
            
            try {
                const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(SHEET_NAME)}`;
                
                showDebug(`Intentando método CSV: ${url}`);
                
                const response = await fetch(url);
                const text = await response.text();
                
                showDebug(`CSV recibido (primeros 200 chars): ${text.substring(0, 200)}`);
                
                // Parse CSV
                const lines = text.split('\n');
                const rows = lines.slice(1).map(line => {
                    // Simple CSV parser (mejora con comillas si es necesario)
                    const values = line.split(',');
                    return { c: values.map(v => ({ v: v.replace(/"/g, '') })) };
                });
                
                showDebug(`Filas CSV procesadas: ${rows.length}`);
                
                processData(rows);
                
            } catch (error) {
                showError(`Método 2 falló: ${error.message}`, error);
            }
        }
        
        function processData(rows) {
            try {
                allData = rows.slice(1).map(row => ({
                    timestamp: row.c[0]?.v || '',
                    name: row.c[1]?.v || '',
                    email: row.c[2]?.v || '',
                    city: row.c[3]?.v || '',
                    profile: row.c[4]?.v || '',
                    qualifies: row.c[5]?.v || '',
                    confidence: row.c[6]?.v || 5,
                    p1_freq: row.c[8]?.v || '',
                    p2_sports: row.c[9]?.v || '',
                    p3_goal: row.c[10]?.v || '',
                    p4_wearable: row.c[11]?.v || '',
                    p5_metrics: row.c[12]?.v || '',
                    p6_understanding: row.c[13]?.v || '',
                    p7_fatigue: row.c[14]?.v || '',
                    p8_pain: row.c[15]?.v || '',
                    p9_frustration: row.c[16]?.v || '',
                    p10_willingness: row.c[17]?.v || '',
                    p11_pricing: row.c[18]?.v || '',
                    p12_confidence: row.c[19]?.v || 5,
                    p13_pro: row.c[20]?.v || '',
                    level: row.c[21]?.v || '',
                    score: parseInt(row.c[22]?.v) || 0
                }));
                
                showDebug(`Datos procesados: ${allData.length} usuarios`);
                
                if (allData.length === 0) {
                    throw new Error('No se encontraron datos en la hoja');
                }
                
                classifyProfiles();
                renderDashboard();
                
                showLoading(false);
                document.getElementById('content').style.display = 'block';
                document.querySelector('.load-section').style.display = 'none';
                
                showSuccess(`✅ Datos cargados exitosamente: ${allData.length} usuarios`);
                
            } catch (error) {
                showError(`Error procesando datos: ${error.message}`, error);
            }
        }
        
        function classifyProfiles() {
            profiles = { maggie: [], kako: [], agus: [], pro: [], anti: [] };
            
            allData.forEach(user => {
                const hasWearable = user.p4_wearable && 
                    (user.p4_wearable.includes('Apple') || 
                     user.p4_wearable.includes('Garmin') || 
                     user.p4_wearable.includes('Whoop'));
                
                const isInterested = user.p4_wearable && user.p4_wearable.includes('me interesa');
                const notInterested = user.p4_wearable && user.p4_wearable.includes('No me interesa');
                const isExpert = user.p6_understanding && user.p6_understanding.includes('perfectamente');
                const isIntermediate = user.p6_understanding && user.p6_understanding.includes('básico');
                const isConfused = user.p6_understanding && user.p6_understanding.includes('No entiendo');
                const hasProtocol = user.p8_pain && user.p8_pain.includes('protocolo propio');
                const wouldUse = user.p10_willingness && 
                    (user.p10_willingness.includes('definitivamente') || 
                     user.p10_willingness.includes('Probablemente sí'));
                const wouldNotUse = user.p10_willingness && 
                    (user.p10_willingness.includes('no') || 
                     user.p10_willingness.includes('Probablemente no'));
                
                // Clasificación
                if (notInterested || wouldNotUse) {
                    profiles.anti.push(user);
                } else if ((isExpert || hasProtocol) && hasWearable) {
                    profiles.pro.push(user);
                } else if (isIntermediate && hasWearable && wouldUse) {
                    profiles.kako.push(user);
                } else if (isConfused && hasWearable && wouldUse) {
                    profiles.agus.push(user);
                } else if ((isInterested || !hasWearable) && wouldUse) {
                    profiles.maggie.push(user);
                } else {
                    // Default classification based on score
                    if (user.score >= 60) profiles.kako.push(user);
                    else if (user.score >= 40) profiles.agus.push(user);
                    else profiles.anti.push(user);
                }
            });
            
            showDebug(`Perfiles clasificados: Kako=${profiles.kako.length}, Agus=${profiles.agus.length}, Pro=${profiles.pro.length}, Maggie=${profiles.maggie.length}, Anti=${profiles.anti.length}`);
        }
        
        function renderDashboard() {
            renderStats();
            renderProfiles();
            renderInsights();
        }
        
        function renderStats() {
            const total = allData.length;
            const targetCount = profiles.kako.length + profiles.agus.length + profiles.pro.length;
            const highValue = allData.filter(u => 
                u.p11_pricing && (u.p11_pricing.includes('$10') || u.p11_pricing.includes('$100'))
            ).length;
            const avgConfidence = (allData.reduce((sum, u) => sum + (parseFloat(u.p12_confidence) || 5), 0) / total).toFixed(1);
            
            document.getElementById('statsGrid').innerHTML = `
                <div class="stat-card">
                    <div class="stat-value">${total}</div>
                    <div class="stat-label">Total Respuestas</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${targetCount}</div>
                    <div class="stat-label">Target Válido</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${Math.round(targetCount/total*100)}%</div>
                    <div class="stat-label">% Conversión</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${highValue}</div>
                    <div class="stat-label">Alto Valor ($10+)</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${avgConfidence}/10</div>
                    <div class="stat-label">Confianza Promedio</div>
                </div>
            `;
        }
        
        function renderProfiles() {
            const profilesData = [
                {
                    id: 'kako',
                    name: 'KAKO - El Guerrero Inteligente',
                    description: 'Tiene wearable, entiende lo básico pero no sabe qué hacer con los datos. Quiere aplicación práctica.',
                    traits: ['Target Principal', 'Wearable ✓', 'Conciencia Media', 'Googlea Activamente'],
                    color: '#5a7a65',
                    isTarget: true
                },
                {
                    id: 'agus',
                    name: 'AGUS - El Metricólogo Curioso',
                    description: 'Tiene wearable pero está confundido. Busca educación básica y claridad.',
                    traits: ['Target Secundario', 'Wearable ✓', 'Confusión Alta', 'Quiere Aprender'],
                    color: '#9d8164',
                    isTarget: true
                },
                {
                    id: 'pro',
                    name: 'PRO - El Optimizador Elite',
                    description: 'Experto con protocolos propios. Solo usa app si ofrece insights únicos o automatización.',
                    traits: ['Target Premium', 'Protocolos Propios', 'Alta Confianza', 'Busca Optimización'],
                    color: '#2d5016',
                    isTarget: true
                },
                {
                    id: 'maggie',
                    name: 'MAGGIE - La Interesada Sin Método',
                    description: 'No tiene wearable pero le interesa. Usaría app pero necesita comprar dispositivo primero.',
                    traits: ['Target Condicional', 'Sin Wearable', 'Interesada', 'Requiere Inversión'],
                    color: '#cc6666',
                    isTarget: false
                },
                {
                    id: 'anti',
                    name: 'ANTI-USER - No Es Target',
                    description: 'No le interesa wearable o no usaría la app. Prefiere decidir por intuición.',
                    traits: ['No Target', 'Sin Interés', 'Intuitivo', 'No Califica'],
                    color: '#666666',
                    isTarget: false
                }
            ];
            
            let html = '';
            profilesData.forEach(profile => {
                const users = profiles[profile.id];
                const count = users.length;
                const percentage = ((count / allData.length) * 100).toFixed(0);
                
                // Calcular estadísticas del grupo
                const avgScore = users.length > 0 
                    ? (users.reduce((sum, u) => sum + u.score, 0) / users.length).toFixed(0)
                    : 0;
                const avgConfidence = users.length > 0
                    ? (users.reduce((sum, u) => sum + (parseFloat(u.p12_confidence) || 5), 0) / users.length).toFixed(1)
                    : 0;
                const topFrustration = getTopValue(users, 'p9_frustration');
                const topPricing = getTopValue(users, 'p11_pricing');
                
                html += `
                    <div class="profile-card ${profile.id}" onclick="toggleDetails('${profile.id}')">
                        <div class="profile-header">
                            <div class="profile-name">${profile.name}</div>
                            <div class="profile-count">${count} (${percentage}%)</div>
                        </div>
                        <div class="profile-description">${profile.description}</div>
                        <div class="profile-traits">
                            ${profile.traits.map(t => `<span class="trait">${t}</span>`).join('')}
                        </div>
                        <div class="profile-details" id="details-${profile.id}">
                            <div class="detail-grid">
                                <div class="detail-item">
                                    <div class="detail-label">Score Promedio</div>
                                    <div class="detail-value">${avgScore}/100</div>
                                </div>
                                <div class="detail-item">
                                    <div class="detail-label">Confianza Promedio</div>
                                    <div class="detail-value">${avgConfidence}/10</div>
                                </div>
                                <div class="detail-item">
                                    <div class="detail-label">Mayor Frustración</div>
                                    <div class="detail-value">${topFrustration || 'N/A'}</div>
                                </div>
                                <div class="detail-item">
                                    <div class="detail-label">Disposición a Pagar</div>
                                    <div class="detail-value">${topPricing || 'N/A'}</div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });
            
            document.getElementById('profilesContainer').innerHTML = html;
        }
        
        function renderInsights() {
            const targetCount = profiles.kako.length + profiles.agus.length + profiles.pro.length;
            const targetPercent = Math.round(targetCount / allData.length * 100);
            
            let insights = [];
            
            // Insight 1: Target validation
            if (targetPercent >= 60) {
                insights.push(`<strong>✅ Target Validado:</strong> ${targetPercent}% de usuarios son target válido (Kako + Agus + Pro). El problema es real.`);
            } else if (targetPercent >= 40) {
                insights.push(`<strong>⚠️ Target Moderado:</strong> ${targetPercent}% son target válido. Considera ajustar mensaje de marketing.`);
            } else {
                insights.push(`<strong>❌ Target Bajo:</strong> Solo ${targetPercent}% son target válido. Revisa propuesta de valor.`);
            }
            
            // Insight 2: Kako dominance
            const kakoPercent = Math.round(profiles.kako.length / allData.length * 100);
            if (kakoPercent >= 30) {
                insights.push(`<strong>🎯 Kako Domina:</strong> ${kakoPercent}% son "Guerrero Inteligente". Enfoca MVP en aplicación práctica de datos.`);
            }
            
            // Insight 3: Pro opportunity
            const proPercent = Math.round(profiles.pro.length / allData.length * 100);
            if (proPercent >= 15) {
                const proMotivations = profiles.pro.map(u => u.p13_pro).filter(Boolean);
                const topProMotivation = getMostCommon(proMotivations);
                insights.push(`<strong>💎 Oportunidad Premium:</strong> ${proPercent}% son PRO. Motivación principal: "${topProMotivation}". Considera tier $15-20/mes.`);
            }
            
            // Insight 4: Pricing
            const highValueCount = allData.filter(u => 
                u.p11_pricing && (u.p11_pricing.includes('$10') || u.p11_pricing.includes('$100'))
            ).length;
            const highValuePercent = Math.round(highValueCount / allData.length * 100);
            
            if (highValuePercent >= 40) {
                insights.push(`<strong>💰 Pricing Validado:</strong> ${highValuePercent}% pagarían $10/mes o $100/año. Precio sugerido: $9.99/mes, $99/año.`);
            } else {
                insights.push(`<strong>💰 Pricing Conservador:</strong> Solo ${highValuePercent}% pagarían $10+. Considera $5-8/mes.`);
            }
            
            // Insight 5: Main pain point
            const allFrustrations = allData.map(u => u.p9_frustration).filter(Boolean);
            const topFrustration = getMostCommon(allFrustrations);
            insights.push(`<strong>😤 Pain Point #1:</strong> "${topFrustration}". Enfoca protocolos en resolver esto.`);
            
            // Insight 6: Maggie warning
            const maggiePercent = Math.round(profiles.maggie.length / allData.length * 100);
            if (maggiePercent >= 20) {
                insights.push(`<strong>⚠️ Advertencia Maggie:</strong> ${maggiePercent}% no tienen wearable pero están interesados. Considera modo "sin wearable" o ignora este segmento.`);
            }
            
            document.getElementById('insightsContainer').innerHTML = 
                insights.map(i => `<div class="insight-item">${i}</div>`).join('');
        }
        
        function toggleDetails(profileId) {
            const details = document.getElementById(`details-${profileId}`);
            details.classList.toggle('active');
        }
        
        function filterProfiles(filter) {
            // Update button states
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            // Filter logic
            const cards = document.querySelectorAll('.profile-card');
            cards.forEach(card => {
                let show = true;
                
                if (filter === 'target') {
                    show = !card.classList.contains('maggie') && !card.classList.contains('anti');
                } else if (filter === 'high-value') {
                    const profileId = Array.from(card.classList).find(c => 
                        ['maggie', 'kako', 'agus', 'pro', 'anti'].includes(c)
                    );
                    const users = profiles[profileId];
                    const highValueUsers = users.filter(u => 
                        u.p11_pricing && (u.p11_pricing.includes('$10') || u.p11_pricing.includes('$100'))
                    );
                    show = highValueUsers.length > 0;
                } else if (filter === 'needs-help') {
                    const profileId = Array.from(card.classList).find(c => 
                        ['maggie', 'kako', 'agus', 'pro', 'anti'].includes(c)
                    );
                    const users = profiles[profileId];
                    const avgConf = users.reduce((sum, u) => sum + (parseFloat(u.p12_confidence) || 5), 0) / users.length;
                    show = avgConf <= 6 && !card.classList.contains('anti');
                }
                
                card.style.display = show ? 'block' : 'none';
            });
        }
        
        function getTopValue(users, field) {
            const values = users.map(u => u[field]).filter(Boolean);
            return getMostCommon(values);
        }
        
        function getMostCommon(arr) {
            if (arr.length === 0) return '';
            const counts = {};
            arr.forEach(item => {
                counts[item] = (counts[item] || 0) + 1;
            });
            return Object.keys(counts).reduce((a, b) => counts[a] > counts[b] ? a : b);
        }
        
        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
        }
        
        function showError(message, error) {
            const errorDiv = document.getElementById('error');
            errorDiv.style.display = 'block';
            errorDiv.innerHTML = `
                <strong>❌ Error:</strong> ${message}<br><br>
                <details>
                    <summary>Detalles técnicos (click para expandir)</summary>
                    <pre>${error ? error.stack : 'No hay stack trace disponible'}</pre>
                </details>
                <br>
                <strong>Posibles soluciones:</strong><br>
                1. Verifica que el Google Sheet sea público (Anyone with link → Viewer)<br>
                2. Verifica que la hoja se llame exactamente "Hoja 1"<br>
                3. Abre la consola del navegador (F12) para ver más detalles<br>
                4. Prueba el otro método (botón alternativo)
            `;
            showLoading(false);
            disableButtons(false);
        }
        
        function hideError() {
            document.getElementById('error').style.display = 'none';
        }
        
        function showSuccess(message) {
            const debugDiv = document.getElementById('debugInfo');
            debugDiv.innerHTML = `<div class="success">${message}</div>`;
        }
        
        function showDebug(message) {
            const debugDiv = document.getElementById('debugInfo');
            debugDiv.innerHTML += `<p style="font-size: 0.8rem; opacity: 0.7; margin: 0.3rem 0;">${message}</p>`;
        }
        
        function disableButtons(disabled) {
            document.getElementById('loadBtn1').disabled = disabled;
            document.getElementById('loadBtn2').disabled = disabled;
        }
    </script>
</body>
</html>
